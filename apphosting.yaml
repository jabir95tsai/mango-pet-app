# Firebase App Hosting backend config
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  timeoutSeconds: 60

# Environment variables: set via Firebase Console after `firebase init apphosting`.
#   Console → App Hosting → 你的 backend → Settings → Environment variables
# Mark each with availability: BUILD + RUNTIME so they're embedded in the client bundle.
#
# Required:
#   NEXT_PUBLIC_FIREBASE_API_KEY
#   NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
#   NEXT_PUBLIC_FIREBASE_PROJECT_ID
#   NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
#   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
#   NEXT_PUBLIC_FIREBASE_APP_ID
#   NEXT_PUBLIC_FIREBASE_VAPID_KEY      (optional, push notifications)
#   NEXT_PUBLIC_GOOGLE_MAPS_API_KEY     (optional, restaurants map)
#   NEXT_PUBLIC_SITE_URL                (your custom domain or *.web.app URL)
