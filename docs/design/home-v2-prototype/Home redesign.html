<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>首頁 · iPhone 重新設計 (Phase 3)</title>
<style>
  html, body { margin: 0; padding: 0; background: #efe6d3; }
  body { font-family: -apple-system, "SF Pro Text", system-ui, sans-serif; color: #231b14; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="home-shared.jsx"></script>
<script type="text/babel" src="home-components.jsx"></script>
<script type="text/babel" src="home-screen.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, DCPostIt, IOSDevice, HomeScreen, MP } = window;

// Same iPhone canvas as walks-v2 / pets-v2 so artboards line up visually.
const IPHONE_W = 402;
const IPHONE_H = 874;
const ABW = IPHONE_W + 20;
const ABH = IPHONE_H + 20;

function Stage({ variant, label }) {
  return (
    <div style={{
      width: ABW, height: ABH,
      display: 'grid', placeItems: 'center',
      background: 'transparent',
    }}>
      <IOSDevice width={IPHONE_W} height={IPHONE_H}>
        <div style={{
          width: '100%', height: '100%', position: 'relative',
          background: MP.bg, overflow: 'hidden',
        }} data-screen-label={label}>
          <div style={{ position: 'absolute', top: 54, left: 0, right: 0, bottom: 0 }}>
            <HomeScreen variant={variant}/>
          </div>
        </div>
      </IOSDevice>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="home-v2"
        title="/app 首頁 · iPhone 重新設計 (Phase 3)"
        subtitle="同 walks-v2 / pets-v2 視覺語言：mango palette · SF Pro · 5-tab bottom nav · 中間 walks 凸起 disc。Feed-first 主方向 + Empty state。"
      >
        <DCArtboard id="B1-feed" label="B1 · Feed-first" width={ABW} height={ABH}>
          <Stage variant="feed" label="首頁 · Feed-first"/>
        </DCArtboard>

        <DCArtboard id="D1-empty" label="D1 · Empty state" width={ABW} height={ABH}>
          <Stage variant="empty" label="首頁 · 第一次進"/>
        </DCArtboard>

        <DCPostIt top={-20} right={60} rotate={3} width={220}>
          B1 = 主流程 (有 pets + posts)，<br/>
          D1 = 第一次進 / no pets。<br/>
          Stories-style 寵物列 + 全 feed 展開。
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
