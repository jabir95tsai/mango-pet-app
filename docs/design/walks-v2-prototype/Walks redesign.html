<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>遛狗紀錄 · iPhone 重新設計</title>
<style>
  html, body { margin: 0; padding: 0; background: #efe6d3; }
  body { font-family: -apple-system, "SF Pro Text", system-ui, sans-serif; color: #231b14; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="walks-screen.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, IOSDevice, WalksScreen, MP } = window;

// iPhone 14 Pro-ish viewport inside the frame (402 x 874 default).
const IPHONE_W = 402;
const IPHONE_H = 874;
// Artboard outer = device width + tiny chrome margin
const ABW = IPHONE_W + 20;
const ABH = IPHONE_H + 20;

function Stage({ state }) {
  return (
    <div style={{
      width: ABW, height: ABH,
      display: 'grid', placeItems: 'center',
      background: 'transparent',
    }}>
      <IOSDevice width={IPHONE_W} height={IPHONE_H}>
        <div style={{
          width: '100%', height: '100%', position: 'relative',
          background: MP.bg, overflow: 'hidden',
        }} data-screen-label={state === 'complete' ? '遛狗 · 目標達標' : '遛狗 · 目標未達標'}>
          <div style={{ position: 'absolute', top: 54, left: 0, right: 0, bottom: 0 }}>
            <WalksScreen state={state}/>
          </div>
        </div>
      </IOSDevice>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="walks" title="遛狗紀錄 · iPhone 重新設計" subtitle="兩種目標狀態。固定底部的「開始遛狗」按鈕、放射狀目標環、本週狀態條。">
        <DCArtboard id="incomplete" label="A · 目標未達標" width={ABW} height={ABH}>
          <Stage state="incomplete"/>
        </DCArtboard>
        <DCArtboard id="complete" label="B · 目標達標" width={ABW} height={ABH}>
          <Stage state="complete"/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
